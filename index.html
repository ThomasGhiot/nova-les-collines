<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NOVA — Les Collines de Valenciennes</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, #2c2440 0%, #16121f 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Consolas, "Courier New", monospace;
    overflow: hidden;
  }
  #wrap { text-align: center; }
  canvas {
    display: block;
    image-rendering: pixelated;
    border-radius: 10px;
    box-shadow: 0 14px 50px rgba(0, 0, 0, .6), 0 0 0 4px #3c3258;
    max-width: 96vw;
    max-height: 86vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  p.hint {
    color: #8d86a8;
    font-size: 13px;
    margin-top: 12px;
    letter-spacing: 1px;
  }
  /* ---- boutons tactiles (affichés uniquement sur écran tactile) ---- */
  #touch { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  #touch button {
    pointer-events: auto;
    position: fixed;
    bottom: 4vh;
    width: 17vmin; height: 17vmin;
    min-width: 56px; min-height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(255, 233, 201, .5);
    background: rgba(60, 50, 88, .55);
    color: #ffe9c9;
    font-family: inherit;
    font-size: 6vmin;
    font-weight: bold;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #touch button:active { background: rgba(240, 128, 32, .65); }
  #btnL { left: 4vw; }
  #btnR { left: calc(4vw + 19vmin); }
  #btnA { right: 4vw; }
  #btnB { right: calc(4vw + 19vmin); }
  @media (pointer: coarse) {
    p.hint { display: none; }
  }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <p class="hint">NOVA le teckel — un mini-platformer · le son démarre à la première touche</p>
  </div>
  <div id="touch" hidden>
    <button id="btnL" aria-label="Gauche">◀</button>
    <button id="btnR" aria-label="Droite">▶</button>
    <button id="btnB" aria-label="Courir">B</button>
    <button id="btnA" aria-label="Sauter">A</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
